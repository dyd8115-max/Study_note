<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Notes</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+KR:wght@400;500;700&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222;
    --border: #2a2a2a;
    --text: #e8e8e0;
    --muted: #666;
    --accent: #7ee8a2;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Noto Sans KR', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 60px 24px;
  }

  .container {
    max-width: 760px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 60px;
    animation: fadeUp 0.6s ease both;
  }

  .header-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  h1 {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -1px;
    line-height: 1.2;
  }

  .subtitle {
    margin-top: 10px;
    color: var(--muted);
    font-size: 14px;
    font-family: var(--mono);
  }

  .divider {
    height: 0.5px;
    background: var(--border);
    margin: 32px 0;
  }

  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }

  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    text-decoration: none;
    color: var(--text);
    display: block;
    transition: border-color 0.2s, transform 0.2s, background 0.2s;
    animation: fadeUp 0.6s ease both;
    position: relative;
    overflow: hidden;
  }

  .card:hover {
    border-color: var(--accent);
    background: #1f1f1f;
    transform: translateY(-2px);
  }

  .card:hover .card-arrow {
    opacity: 1;
    transform: translate(2px, -2px);
  }

  .card-tag {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 3px;
    display: inline-block;
    margin-bottom: 12px;
  }

  .card-title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 6px;
    letter-spacing: -0.3px;
  }

  .card-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
  }

  .card-arrow {
    position: absolute;
    top: 18px;
    right: 18px;
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    color: var(--accent);
    font-family: var(--mono);
  }

  .card-coming {
    background: var(--surface);
    border: 0.5px dashed var(--border);
    border-radius: 10px;
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    animation: fadeUp 0.6s ease both;
  }

  .card-coming-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
  }

  .card-coming-text {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  /* 색상별 태그 */
  .tag-cyan  { background: #0e2e38; color: #90e0ef; }
  .tag-green { background: #1a3a25; color: #7ee8a2; }
  .tag-amber { background: #3a2e10; color: #f9c74f; }
  .tag-purple{ background: #2a1a40; color: #c77dff; }
  .tag-coral { background: #3a1a10; color: #f4a261; }

  footer {
    margin-top: 80px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--border);
    text-align: center;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.10s; }
  .card:nth-child(3) { animation-delay: 0.15s; }
  .card-coming       { animation-delay: 0.20s; }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-label">dyd8115-max</div>
    <h1>Study Notes</h1>
    <p class="subtitle">학부 전공 수업 정리 노트</p>
  </header>

  <div class="divider"></div>

  <p class="section-label">전공 과목</p>

  <div class="grid">

    <!-- 데이터 통신 -->
    <a class="card" href="./data-communications/index.html">
      <span class="card-arrow">↗</span>
      <span class="card-tag tag-cyan">Data Communications</span>
      <div class="card-title">데이터 통신</div>
      <div class="card-desc">OSI 7계층, TCP/IP, 신호 이론, 나이퀴스트/섀논, PCM</div>
    </a>

    <!-- 추가 예정 슬롯들 -->
    <div class="card-coming">
      <div class="card-coming-dot"></div>
      <span class="card-coming-text">추가 예정</span>
    </div>

    <div class="card-coming">
      <div class="card-coming-dot"></div>
      <span class="card-coming-text">추가 예정</span>
    </div>

  </div>

  <footer>Study Notes · dyd8115-max.github.io</footer>

</div>
</body>
</html>

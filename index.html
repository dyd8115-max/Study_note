<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Notes</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+KR:wght@400;500;700&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222;
    --border: #2a2a2a;
    --text: #e8e8e0;
    --muted: #666;
    --accent: #7ee8a2;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Noto Sans KR', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 60px 24px;
  }

  .container { max-width: 760px; margin: 0 auto; }

  header {
    margin-bottom: 60px;
    animation: fadeUp 0.6s ease both;
  }

  .header-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  h1 {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -1px;
    line-height: 1.2;
  }

  .subtitle {
    margin-top: 10px;
    color: var(--muted);
    font-size: 14px;
    font-family: var(--mono);
  }

  .divider {
    height: 0.5px;
    background: var(--border);
    margin: 32px 0;
  }

  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }

  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    color: var(--text);
    position: relative;
    overflow: visible;
    animation: fadeUp 0.6s ease both;
    transition: border-color 0.2s, background 0.2s, transform 0.2s;
    cursor: pointer;
  }

  .card:hover {
    border-color: var(--accent);
    background: #1f1f1f;
    transform: translateY(-2px);
  }

  .card:hover .card-arrow { opacity: 1; transform: translate(2px, -2px); }
  .card:hover .edit-btn { opacity: 1; }
  .card:hover .ai-btn { opacity: 1; }

  .card-arrow {
    position: absolute;
    top: 18px;
    right: 18px;
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    color: var(--accent);
    font-family: var(--mono);
    pointer-events: none;
  }

  .card-tag {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 3px;
    display: inline-block;
    margin-bottom: 12px;
    cursor: pointer;
    transition: opacity 0.2s;
    user-select: none;
  }

  .card-tag:hover { opacity: 0.8; }

  .card-title-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 6px;
  }

  .card-title {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.3px;
    flex: 1;
  }

  .edit-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 3px;
    opacity: 0;
    transition: opacity 0.2s, color 0.2s;
    flex-shrink: 0;
    line-height: 1;
  }

  .edit-btn:hover { color: var(--accent); }

  /* 설명 영역 */
  .card-desc-row {
    display: flex;
    align-items: flex-start;
    gap: 6px;
    min-height: 20px;
  }

  .card-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
    cursor: text;
    flex: 1;
  }

  /* AI 버튼 */
  .ai-btn {
    background: none;
    border: none;
    font-size: 12px;
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 3px;
    opacity: 0;
    transition: opacity 0.2s, color 0.2s;
    flex-shrink: 0;
    line-height: 1;
    color: var(--muted);
    font-family: var(--mono);
  }

  .ai-btn:hover { color: #f9c74f; }
  .ai-btn.loading { color: #f9c74f; opacity: 1; animation: spin 1s linear infinite; }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .edit-input {
    background: var(--surface2);
    border: 0.5px solid var(--accent);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 700;
    padding: 2px 6px;
    width: 100%;
    outline: none;
  }

  .edit-input.desc {
    font-size: 12px;
    font-weight: 400;
    color: var(--muted);
  }

  .color-palette {
    display: none;
    position: absolute;
    top: 40px;
    left: 0;
    background: #1e1e1e;
    border: 0.5px solid #3a3a3a;
    border-radius: 8px;
    padding: 8px;
    gap: 6px;
    flex-wrap: wrap;
    width: 148px;
    z-index: 200;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }

  .color-palette.open { display: flex; }

  .color-dot {
    width: 22px;
    height: 22px;
    border-radius: 5px;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: transform 0.15s, border-color 0.15s;
  }

  .color-dot:hover { transform: scale(1.2); }
  .color-dot.active { border-color: white; }

  footer {
    margin-top: 80px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--border);
    text-align: center;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-label">dyd8115-max</div>
    <h1>Study Notes</h1>
    <p class="subtitle">학부 전공 수업 정리 노트</p>
  </header>

  <div class="divider"></div>
  <p class="section-label">전공 과목</p>
  <div class="grid" id="grid"></div>

  <footer>Study Notes · dyd8115-max.github.io</footer>
</div>

<script>
const COLORS = [
  { bg: '#0e2e38', text: '#90e0ef' },
  { bg: '#1a3a25', text: '#7ee8a2' },
  { bg: '#3a2e10', text: '#f9c74f' },
  { bg: '#2a1a40', text: '#c77dff' },
  { bg: '#3a1a10', text: '#f4a261' },
  { bg: '#1a2a3a', text: '#74b0ff' },
  { bg: '#2a1a2a', text: '#ff8fab' },
  { bg: '#1a3a38', text: '#52e0c4' },
];

function getSaved(id) {
  try { return JSON.parse(localStorage.getItem('card_' + id)) || {}; } catch { return {}; }
}

function save(id, data) {
  localStorage.setItem('card_' + id, JSON.stringify({ ...getSaved(id), ...data }));
}

function formatId(id) {
  return id.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
}

async function generateDesc(id) {
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 100,
      messages: [{
        role: 'user',
        content: `학부 전공 과목 "${formatId(id)}" 의 핵심 주제를 한국어로 한 줄(30자 이내)로 요약해줘. 키워드 나열 형식으로, 예시처럼: "OSI 7계층, TCP/IP, 신호 이론, PCM". 설명 없이 키워드만.`
      }]
    })
  });
  const data = await response.json();
  return data.content[0].text.trim();
}

function buildCard(course, index) {
  const saved = getSaved(course.id);
  const colorIdx = saved.colorIdx !== undefined ? saved.colorIdx : (index % COLORS.length);
  const color = COLORS[colorIdx];
  const title = saved.title || formatId(course.id);
  const desc = saved.desc || course.desc || '-';

  const card = document.createElement('div');
  card.className = 'card';
  card.style.animationDelay = (index * 0.05 + 0.05) + 's';

  card.innerHTML = `
    <span class="card-arrow">↗</span>

    <div style="position:relative;display:inline-block;">
      <span class="card-tag"
            style="background:${color.bg};color:${color.text};"
            data-id="${course.id}">
        ${formatId(course.id)}
      </span>
      <div class="color-palette" id="palette-${course.id}">
        ${COLORS.map((c, i) => `
          <div class="color-dot ${i === colorIdx ? 'active' : ''}"
               style="background:${c.text};"
               data-idx="${i}"></div>
        `).join('')}
      </div>
    </div>

    <div class="card-title-row">
      <div class="card-title" id="title-${course.id}">${title}</div>
      <button class="edit-btn" title="제목 편집">✎</button>
    </div>

    <div class="card-desc-row">
      <div class="card-desc" id="desc-${course.id}">${desc}</div>
      <button class="ai-btn" title="AI 설명 자동 생성">✦</button>
    </div>
  `;

  // 카드 클릭 → 링크 이동
  card.addEventListener('click', (e) => {
    if (
      e.target.closest('.edit-btn') ||
      e.target.closest('.ai-btn') ||
      e.target.closest('.card-tag') ||
      e.target.closest('.color-palette') ||
      e.target.closest('.edit-input') ||
      e.target.closest('.card-desc')
    ) return;
    window.location.href = course.href;
  });

  return card;
}

function attachEvents(course, card) {
  const tag = card.querySelector('.card-tag');
  const palette = card.querySelector('.color-palette');
  const editBtn = card.querySelector('.edit-btn');
  const aiBtn = card.querySelector('.ai-btn');
  const descEl = card.querySelector('.card-desc');

  // 태그 클릭 → 팔레트 토글
  tag.addEventListener('click', (e) => {
    e.stopPropagation();
    const isOpen = palette.classList.contains('open');
    document.querySelectorAll('.color-palette.open').forEach(p => p.classList.remove('open'));
    if (!isOpen) palette.classList.add('open');
  });

  // 색상 선택
  palette.querySelectorAll('.color-dot').forEach((dot, i) => {
    dot.addEventListener('click', (e) => {
      e.stopPropagation();
      const color = COLORS[i];
      tag.style.background = color.bg;
      tag.style.color = color.text;
      palette.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
      dot.classList.add('active');
      save(course.id, { colorIdx: i });
      palette.classList.remove('open');
    });
  });

  // 제목 편집
  editBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    const titleEl = card.querySelector('.card-title');
    if (!titleEl) return;

    const input = document.createElement('input');
    input.className = 'edit-input';
    input.value = titleEl.textContent;
    titleEl.replaceWith(input);
    input.focus();
    input.select();

    function commit() {
      const val = input.value.trim() || formatId(course.id);
      const newEl = document.createElement('div');
      newEl.className = 'card-title';
      newEl.id = 'title-' + course.id;
      newEl.textContent = val;
      input.replaceWith(newEl);
      save(course.id, { title: val });
    }

    input.addEventListener('blur', commit);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === 'Escape') { e.preventDefault(); commit(); }
    });
  });

  // 설명 클릭 → 직접 편집
  descEl.addEventListener('click', (e) => {
    e.stopPropagation();
    if (descEl.querySelector('input')) return;

    const input = document.createElement('input');
    input.className = 'edit-input desc';
    input.value = descEl.textContent === '-' ? '' : descEl.textContent;
    input.placeholder = '설명 입력...';
    descEl.textContent = '';
    descEl.appendChild(input);
    input.focus();

    function commit() {
      const val = input.value.trim() || '-';
      descEl.textContent = val;
      save(course.id, { desc: val });
    }

    input.addEventListener('blur', commit);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === 'Escape') { e.preventDefault(); commit(); }
    });
  });

  // AI 버튼 → 자동 생성
  aiBtn.addEventListener('click', async (e) => {
    e.stopPropagation();
    if (aiBtn.classList.contains('loading')) return;

    aiBtn.classList.add('loading');
    aiBtn.textContent = '↻';
    descEl.style.color = '#444';
    descEl.textContent = '생성 중...';

    try {
      const result = await generateDesc(course.id);
      descEl.textContent = result;
      descEl.style.color = '';
      save(course.id, { desc: result });
    } catch (err) {
      descEl.textContent = '-';
      descEl.style.color = '';
      console.error(err);
    }

    aiBtn.classList.remove('loading');
    aiBtn.textContent = '✦';
  });
}

// 팔레트 외부 클릭 시 닫기
document.addEventListener('click', () => {
  document.querySelectorAll('.color-palette.open').forEach(p => p.classList.remove('open'));
});

// 메인 실행
fetch('./courses.json')
  .then(r => r.json())
  .then(courses => {
    const grid = document.getElementById('grid');
    courses.forEach((course, i) => {
      const card = buildCard(course, i);
      grid.appendChild(card);
      attachEvents(course, card);
    });

    const coming = document.createElement('div');
    coming.style.cssText = 'background:var(--surface);border:0.5px dashed var(--border);border-radius:10px;padding:20px;display:flex;align-items:center;gap:10px;';
    coming.innerHTML = `
      <div style="width:6px;height:6px;border-radius:50%;background:var(--border);flex-shrink:0;"></div>
      <span style="font-family:var(--mono);font-size:11px;color:var(--muted);">추가 예정</span>
    `;
    grid.appendChild(coming);
  });
</script>
</body>
</html>

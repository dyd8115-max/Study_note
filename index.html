<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Notes</title>
<link rel="stylesheet" href="./assets/common.css">
<style>
  /* 홈 전용 스타일 */
  .container { max-width: 760px; margin: 0 auto; }

  header { margin-bottom: 60px; animation: fadeUp 0.6s ease both; }

  .header-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent1);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  h1 { font-size: 32px; font-weight: 700; letter-spacing: -1px; line-height: 1.2; }

  .subtitle { margin-top: 10px; color: var(--muted); font-size: 14px; font-family: var(--mono); }

  .divider { height: 0.5px; background: var(--border); margin: 32px 0; }

  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }

  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    color: var(--text);
    position: relative;
    overflow: visible;
    animation: fadeUp 0.6s ease both;
    transition: border-color 0.2s, background 0.2s, transform 0.2s;
    cursor: pointer;
  }

  .card:hover { border-color: var(--accent1); background: #1f1f1f; transform: translateY(-2px); }
  .card:hover .card-arrow { opacity: 1; transform: translate(2px, -2px); }
  .card:hover .edit-btn { opacity: 1; }

  .card-arrow {
    position: absolute; top: 18px; right: 18px; font-size: 14px;
    opacity: 0; transition: opacity 0.2s, transform 0.2s;
    color: var(--accent1); font-family: var(--mono); pointer-events: none;
  }

  .card-tag {
    font-family: var(--mono); font-size: 10px; font-weight: 600;
    padding: 2px 8px; border-radius: 3px; display: inline-block;
    margin-bottom: 12px; cursor: pointer; transition: opacity 0.2s; user-select: none;
  }

  .card-tag:hover { opacity: 0.8; }

  .card-title-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }

  .card-title { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; flex: 1; }

  .edit-btn {
    background: none; border: none; color: var(--muted); font-size: 12px;
    cursor: pointer; padding: 2px 4px; border-radius: 3px;
    opacity: 0; transition: opacity 0.2s, color 0.2s; flex-shrink: 0; line-height: 1;
  }

  .edit-btn:hover { color: var(--accent1); }

  .card-desc-row { display: flex; align-items: flex-start; gap: 6px; min-height: 20px; }

  .card-desc { font-size: 12px; color: var(--muted); line-height: 1.6; cursor: text; flex: 1; }

  .edit-input {
    background: var(--surface2); border: 0.5px solid var(--accent1);
    border-radius: 4px; color: var(--text); font-family: var(--sans);
    font-size: 15px; font-weight: 700; padding: 2px 6px; width: 100%; outline: none;
  }

  .edit-input.desc { font-size: 12px; font-weight: 400; color: var(--muted); }

  .color-palette {
    display: none; position: absolute; top: 40px; left: 0;
    background: #1e1e1e; border: 0.5px solid #3a3a3a; border-radius: 8px;
    padding: 8px; gap: 6px; flex-wrap: wrap; width: 148px;
    z-index: 200; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }

  .color-palette.open { display: flex; }

  .color-dot {
    width: 22px; height: 22px; border-radius: 5px; cursor: pointer;
    border: 1.5px solid transparent; transition: transform 0.15s, border-color 0.15s;
  }

  .color-dot:hover { transform: scale(1.2); }
  .color-dot.active { border-color: white; }

  footer { margin-top: 80px; }

  .search-wrap { position: relative; margin-bottom: 16px; }

  .search-input {
    width: 100%;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 10px 16px 10px 36px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input:focus { border-color: var(--accent1); }
  .search-input::placeholder { color: var(--muted); }

  .search-icon {
    position: absolute; left: 12px; top: 50%;
    transform: translateY(-50%); color: var(--muted);
    font-size: 13px; pointer-events: none;
  }

  .no-result { font-family: var(--mono); font-size: 12px; color: var(--muted); padding: 20px 0; }

  /* 그룹 박스 */
  .group-box {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px 20px;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }

  .group-box.drag-over {
    border-color: var(--accent1);
    background: #1a1f1a;
  }

  .group-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }

  .group-name {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 4px;
    transition: color 0.2s, background 0.2s;
    flex: 1;
  }

  .group-name:hover { color: var(--text); background: var(--surface2); }

  .group-name-input {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    background: var(--surface2);
    border: 0.5px solid var(--accent1);
    border-radius: 4px;
    color: var(--text);
    padding: 2px 6px;
    outline: none;
    flex: 1;
  }

  .group-delete-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 11px;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    transition: color 0.2s, background 0.2s;
    font-family: var(--mono);
  }

  .group-delete-btn:hover { color: #ff8fab; background: #2a1a2a; }

  .group-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
    min-height: 60px;
  }

  .group-grid:empty::after {
    content: '카드를 여기로 드래그하세요';
    font-family: var(--mono);
    font-size: 11px;
    color: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    grid-column: 1 / -1;
  }

  /* 드래그 중인 카드 */
  .card.dragging {
    opacity: 0.4;
    cursor: grabbing;
  }

  .card { cursor: grab; }

  /* 그룹 추가 버튼 */
  #add-group-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: 0.5px dashed var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    padding: 12px 20px;
    cursor: pointer;
    width: 100%;
    justify-content: center;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
    margin-bottom: 40px;
  }

  #add-group-btn:hover {
    border-color: var(--accent1);
    color: var(--accent1);
    background: var(--surface);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-label">dyd8115-max</div>
    <h1>Study Notes</h1>
    <p class="subtitle">학부 전공 수업 정리 노트</p>
  </header>

  <div class="divider"></div>

  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input class="search-input" id="search" type="text" placeholder="과목 검색...">
  </div>

  <div id="groups-container"></div>

  <button id="add-group-btn">+ 그룹 추가</button>

  <footer>Study Notes · dyd8115-max.github.io</footer>
</div>

<script src="./assets/home.js"></script>
</body>
</html>
